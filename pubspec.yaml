name: logigo
description: A Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # 🔔 Bildirimler
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # 📍 Harita + konum
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0

  # 🔗 Link / yol tarifi
  url_launcher: ^6.3.0

  # 🔥 Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.3.6

  # 🖼️ Fotoğraf seçme
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon.png